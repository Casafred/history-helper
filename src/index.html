<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>专利审查梳理工具</title>
  <link rel="stylesheet" href="styles/main.css?v=260715k">
  <link rel="stylesheet" href="styles/agent.css?v=260715g">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>专利审查梳理工具</h1>
      <p class="subtitle">PatentLens</p>
    </header>

    <main class="app-main">
      <section class="search-section">
        <div class="search-box">
          <input
            type="text"
            id="patent-input"
            placeholder="输入专利号（如 US14412875, EP1234567, WO2023123456）"
            autocomplete="off"
          >
          <button id="search-btn" class="btn-primary">查询</button>
          <button id="ai-settings-btn" class="btn-icon" title="AI 设置"><svg class="svg-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
        </div>
        <div id="office-badge" class="office-badge hidden"></div>
      </section>

      <section id="result-section" class="result-section hidden">
        <div class="tabs">
          <button class="tab-btn active" data-tab="overview">概览</button>
          <button class="tab-btn" data-tab="family">同族</button>
          <button class="tab-btn" data-tab="documents">审查文档</button>
          <button class="tab-btn" data-tab="ai-summary">AI 梳理</button>
        </div>

        <div id="tab-overview" class="tab-content active">
          <div id="overview-content" class="card-grid">
            <div class="info-card">
              <div class="card-header">申请信息</div>
              <div id="app-info" class="card-body">
                <p class="placeholder">请输入专利号进行查询</p>
              </div>
            </div>
            <div class="info-card">
              <div class="card-header">当前状态</div>
              <div id="app-status" class="card-body">
                <p class="placeholder">-</p>
              </div>
            </div>
          </div>
        </div>

        <div id="tab-family" class="tab-content">
          <div id="family-content">
            <p class="placeholder">暂无同族信息</p>
          </div>
        </div>

        <div id="tab-documents" class="tab-content">
          <div id="documents-content">
            <p class="placeholder">暂无审查文档</p>
          </div>
        </div>

        <div id="tab-ai-summary" class="tab-content">
          <div id="ai-summary-content">
            <div class="ai-summary-header">
              <button id="ai-summarize-btn" class="btn-primary" disabled>开始 AI 梳理</button>
              <span id="ai-status" class="ai-status"></span>
            </div>
            <div id="ai-summary-result" class="ai-summary-result">
              <p class="placeholder">请先查询专利，然后点击"开始 AI 梳理"对审查历史进行智能分析</p>
            </div>
          </div>
        </div>
      </section>

      <section id="convert-section" class="convert-section hidden">
        <div class="info-card">
          <div class="card-header">格式转换结果</div>
          <div id="convert-result" class="card-body"></div>
        </div>
      </section>

      <div id="ai-settings-modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
          <div class="modal-header">
            <h2>AI 服务设置</h2>
            <button id="modal-close-btn" class="btn-icon">&times;</button>
          </div>
          <div class="modal-body">
            <div class="form-group">
              <label>AI 服务商</label>
              <select id="ai-provider-select">
                <option value="zhipu">智谱 (GLM)</option>
                <option value="deepseek">DeepSeek</option>
                <option value="openai">OpenAI</option>
              </select>
            </div>
            <div class="form-group">
              <label>API Key</label>
              <input type="password" id="ai-api-key-input" placeholder="输入 API Key">
            </div>
            <div class="form-group">
              <label>Base URL</label>
              <input type="text" id="ai-base-url-input" placeholder="API Base URL">
            </div>
            <div class="form-group">
              <label>模型</label>
              <input type="text" id="ai-model-select" list="ai-model-select-datalist" placeholder="选择或输入模型名称">
              <datalist id="ai-model-select-datalist"></datalist>
            </div>
            <div class="form-actions">
              <button id="ai-test-btn" class="btn-secondary">测试连接</button>
              <button id="ai-save-btn" class="btn-primary">保存</button>
            </div>
            <div id="ai-test-result" class="test-result hidden"></div>

            <hr style="border-color:var(--border);margin:20px 0 16px">
            <h3 style="margin:0 0 12px;font-size:15px;color:var(--text-secondary)">OCR 文字识别设置</h3>
            <div class="form-group">
              <label>OCR 引擎</label>
              <select id="ocr-engine-select">
                <option value="paddle_ocr_vl">PaddleOCR-VL（免费，无需 Key）</option>
                <option value="glm_ocr">GLM OCR（需要智谱 API Key）</option>
              </select>
            </div>
            <div class="form-group" id="ocr-glm-key-group" style="display:none">
              <label>GLM OCR API Key</label>
              <input type="password" id="ocr-glm-key-input" placeholder="智谱 API Key（用于 GLM OCR）">
              <small style="color:var(--text-secondary);margin-top:4px;display:block">如已配置智谱 AI 服务商，可留空自动复用其 Key</small>
            </div>

            <hr style="border-color:var(--border);margin:20px 0 16px">
            <h3 style="margin:0 0 12px;font-size:15px;color:var(--text-secondary)">AI 提示词自定义</h3>
            <div class="form-group">
              <label>审查意见梳理提示词（含溯源版）</label>
              <textarea id="prompt-kanban-analysis" class="prompt-textarea" rows="6" placeholder="审查意见梳理提示词（含 OCR 溯源信息时使用）"></textarea>
              <div class="prompt-actions">
                <button id="reset-prompt-kanban-analysis" class="btn-secondary btn-small" type="button">恢复默认</button>
              </div>
            </div>
            <div class="form-group">
              <label>审查意见梳理提示词（简化版）</label>
              <textarea id="prompt-kanban-simple" class="prompt-textarea" rows="4" placeholder="审查意见梳理提示词（无溯源信息时使用）"></textarea>
              <div class="prompt-actions">
                <button id="reset-prompt-kanban-simple" class="btn-secondary btn-small" type="button">恢复默认</button>
              </div>
            </div>
            <div class="form-group">
              <label>单文档分析提示词</label>
              <textarea id="prompt-doc-analysis" class="prompt-textarea" rows="3" placeholder="单篇文档 AI 分析提示词"></textarea>
              <div class="prompt-actions">
                <button id="reset-prompt-doc-analysis" class="btn-secondary btn-small" type="button">恢复默认</button>
              </div>
            </div>
            <div class="form-group">
              <label>审查历史梳理提示词</label>
              <textarea id="prompt-history-summary" class="prompt-textarea" rows="3" placeholder="审查历史整体梳理提示词"></textarea>
              <div class="prompt-actions">
                <button id="reset-prompt-history-summary" class="btn-secondary btn-small" type="button">恢复默认</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div id="loading" class="loading hidden">
        <div class="spinner"></div>
        <p id="loading-text">正在查询...</p>
      </div>

      <div id="error-toast" class="toast hidden"></div>
    </main>

    <footer class="app-footer">
      <em><strong>Developed by Alfred Shi</strong></em> <span class="app-version">v260718</span>
    </footer>
  </div>

  <script src="scripts/marked.min.js"></script>
  <script src="scripts/docx.umd.js"></script>
  <script src="scripts/FileSaver.min.js"></script>
  <script src="scripts/web-ai.js?v=260715g"></script>
  <script src="scripts/patent-status.js?v=260715g"></script>
  <script src="scripts/web-app.js?v=260715k"></script>
  <script src="scripts/image-annotations.js?v=260715k"></script>

  <script src="scripts/agent/event-bus.js?v=260715g"></script>
  <script src="scripts/agent/llm-client.js?v=260715g"></script>
  <script src="scripts/agent/tool-registry.js?v=260715g"></script>
  <script src="scripts/agent/agent-loop.js?v=260715g"></script>
  <script src="scripts/agent/tools/base-tools.js?v=260715g"></script>
  <script src="scripts/agent/tools/patent-tools.js?v=260715g"></script>
  <script src="scripts/agent/agent.js?v=260715g"></script>
  <script src="scripts/agent/ui/agent-panel.js?v=260715g"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      PatentLensAgent.init();
      AgentUI.init();
    });
  </script>
</body>
</html>
