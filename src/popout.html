<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>专利原文查看</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #fff; }
    body { display: flex; flex-direction: column; }
    #po-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; background: #f0f9f4; border-bottom: 1px solid #bbf7d0;
      flex-shrink: 0;
    }
    #po-title { font-size: 13px; color: #14532d; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .po-btn {
      cursor: pointer; border: 1px solid #bbb; background: #fff; color: #333;
      font-size: 12px; padding: 4px 12px; border-radius: 4px; transition: all 0.2s;
      white-space: nowrap; text-decoration: none; display: inline-block;
    }
    .po-btn:hover { background: #22c55e; color: #fff; border-color: #22c55e; }
    .po-btn:disabled { opacity: 0.4; cursor: default; background: #fff; color: #999; border-color: #ddd; }
    .po-btn:disabled:hover { background: #fff; color: #999; border-color: #ddd; }
    .po-btn-nav { width: 28px; height: 26px; padding: 2px 0; display: inline-flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; }
    .po-btn-find { width: 28px; height: 26px; padding: 2px 0; display: inline-flex; align-items: center; justify-content: center; }
    #po-jp-bar {
      display: none; align-items: center; gap: 8px;
      background: #fff3cd; border-bottom: 1px solid #ffc107;
      padding: 6px 14px; font-size: 12px; color: #856404; flex-shrink: 0;
    }
    #po-jp-bar .po-jp-label { font-weight: bold; }
    #po-jp-bar .po-jp-hint { flex: 1; color: #a08030; }
    #po-cn-bar {
      display: none; align-items: center; gap: 8px;
      background: #d1ecf1; border-bottom: 1px solid #0c5460;
      padding: 6px 14px; font-size: 12px; color: #0c5460; flex-shrink: 0;
    }
    #po-cn-bar .po-cn-label { font-weight: bold; }
    #po-cn-bar .po-cn-hint { flex: 1; color: #0c5460; }
    #po-find-bar {
      display: none; align-items: center; gap: 6px;
      background: #f5f5f5; border-bottom: 1px solid #ddd;
      padding: 6px 12px; flex-shrink: 0;
    }
    #po-find-input {
      flex: 1; max-width: 240px; background: #fff; border: 1px solid #ccc;
      border-radius: 4px; padding: 4px 8px; font-size: 12px; outline: none;
    }
    #po-find-input:focus { border-color: #22c55e; }
    #po-find-count { font-size: 11px; color: #888; min-width: 80px; text-align: center; }
    #po-smart-bar {
      display: none; flex-wrap: wrap; align-items: center; gap: 6px;
      position: fixed; top: 48px; left: 50%; transform: translateX(-50%);
      background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 20px;
      padding: 5px 16px; font-size: 12px; color: #14532d;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12); z-index: 9998;
      max-width: 92vw; max-height: 120px; overflow-y: auto;
    }
    #po-smart-bar .po-smart-label { font-weight: bold; color: #14532d; margin-right: 4px; }
    #po-smart-bar .po-smart-info { color: #166534; margin-right: 8px; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #po-smart-bar .po-smart-actions { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
    .po-btn-smart {
      cursor: pointer; border: 1px solid #22c55e; background: #fff; color: #16a34a;
      font-size: 11px; padding: 2px 8px; border-radius: 3px; transition: all 0.2s;
      white-space: nowrap; text-decoration: none; display: inline-block;
    }
    .po-btn-smart:hover { background: #22c55e; color: #fff; }
    .po-btn-smart.po-btn-primary { background: #22c55e; color: #fff; }
    .po-btn-smart.po-btn-primary:hover { background: #16a34a; }
    .po-btn-smart.po-btn-warn { border-color: #e67e22; color: #e67e22; }
    .po-btn-smart.po-btn-warn:hover { background: #e67e22; color: #fff; }
    #po-container { width: 100%; flex: 1; position: relative; background: #fff; min-height: 0; }
    #po-container webview, #po-container iframe { width: 100%; height: 100%; border: none; }
    .po-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #888; font-size: 14px; text-align: center; }
    .po-fallback { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #555; font-size: 14px; padding: 24px; max-width: 480px; line-height: 1.8; }
    .po-fallback .po-btn { margin-top: 12px; }
  </style>
</head>

      function refreshPage() {
        loadAttempts = 0;
        if (isElectron && wv) {
          _wvFailed = false;
          showLoading("正在加载...");
          hideSmartBar();
          stopPeriodicProbe();
          if (timeoutTimer) { clearTimeout(timeoutTimer); timeoutTimer = null; }
          try { wv.reload(); } catch (e) { console.warn("reload failed:", e); _recreateWebview(); }
          setTimeout(function() { hideLoading(); updateNavButtons(); }, 2000);
        } else {
          var iframe = container.querySelector("iframe");
          if (iframe) iframe.src = iframe.src;
          else embed();
        }
      }

      function updateNavButtons() {
        if (!isElectron || !wv) {
          if (backBtn) backBtn.disabled = true;
          if (forwardBtn) forwardBtn.disabled = true;
          return;
        }
        try {
          var canBack = false, canForward = false;
          try { canBack = wv.canGoBack(); } catch(e) { canBack = false; }
          try { canForward = wv.canGoForward(); } catch(e) { canForward = false; }
          if (backBtn) backBtn.disabled = !canBack;
          if (forwardBtn) forwardBtn.disabled = !canForward;
        } catch(e) {
          if (backBtn) backBtn.disabled = true;
          if (forwardBtn) forwardBtn.disabled = true;
        }
      }

      function scheduleNavButtonsUpdate() {
        setTimeout(updateNavButtons, 50);
        setTimeout(updateNavButtons, 150);
        setTimeout(updateNavButtons, 300);
        setTimeout(updateNavButtons, 600);
        setTimeout(updateNavButtons, 1000);
        setTimeout(updateNavButtons, 1500);
        setTimeout(updateNavButtons, 2500);
      }

      function goBack() {
        if (!isElectron || !wv) return;
        try {
          if (wv.canGoBack()) {
            _wvFailed = false;
            loadAttempts = 0;
            showLoading("正在加载...");
            hideSmartBar();
            stopPeriodicProbe();
            if (timeoutTimer) { clearTimeout(timeoutTimer); timeoutTimer = null; }
            try { wv.goBack(); } catch(navErr) { console.warn("goBack failed:", navErr); hideLoading(); }
            scheduleNavButtonsUpdate();
          }
        } catch(e) { console.warn("goBack error:", e); hideLoading(); }
      }

      function goForward() {
        if (!isElectron || !wv) return;
        try {
          if (wv.canGoForward()) {
            _wvFailed = false;
            loadAttempts = 0;
            showLoading("正在加载...");
            hideSmartBar();
            stopPeriodicProbe();
            if (timeoutTimer) { clearTimeout(timeoutTimer); timeoutTimer = null; }
            try { wv.goForward(); } catch(navErr) { console.warn("goForward failed:", navErr); hideLoading(); }
            scheduleNavButtonsUpdate();
          }
        } catch(e) { console.warn("goForward error:", e); hideLoading(); }
      }

      if (backBtn) backBtn.addEventListener("click", goBack);
      if (forwardBtn) forwardBtn.addEventListener("click", goForward);

      // Keyboard shortcuts: Alt+Left/Right for back/forward
      document.addEventListener("keydown", function(e) {
        if (e.altKey && (e.key === "ArrowLeft" || e.key === "Left")) {
          e.preventDefault();
          goBack();
        } else if (e.altKey && (e.key === "ArrowRight" || e.key === "Right")) {
          e.preventDefault();
          goForward();
        }
      });

      // Translate dropdown menu
      var translateMenu = document.getElementById("po-translate-menu");
      function hideTranslateMenu() { if (translateMenu) translateMenu.style.display = "none"; }
      translateBtn.addEventListener("click", function(e) {
        e.stopPropagation();
        if (translateMenu) {
          translateMenu.style.display = translateMenu.style.display === "block" ? "none" : "block";
          updateTranslateMenuItems();
        }
      });
      document.addEventListener("click", function(e) {

          hideTranslateMenu();
        }
      });
      function updateTranslateMenuItems() {
        var items = translateMenu.querySelectorAll(".po-tm-item");
        items.forEach(function(item) {
          var action = item.getAttribute("data-action");
          var mainDiv = item.querySelector("div:first-child");
          var subDiv = item.querySelector("div:last-child");
          if (action === "bilingual") {
            if (translateMode === "bilingual") {
              mainDiv.innerHTML = picon('edit') + ' 关闭双语翻译';
              subDiv.textContent = "点击关闭沉浸式对照翻译";
              item.style.background = "#eff6ff";
            } else {
              mainDiv.innerHTML = picon('edit') + ' 双语对照翻译';
              subDiv.textContent = "沉浸式显示原文+译文";
              item.style.background = "";
            }
          } else if (action === "google") {
            var isOnGoogleTranslate = currentUrl && currentUrl.indexOf("translate.google.com/translate") !== -1;
            if (isOnGoogleTranslate || translateMode === "google") {
              mainDiv.innerHTML = picon('globe') + ' 返回原文页面';
              subDiv.textContent = "退出Google整页翻译";
              item.style.background = "#eff6ff";
            } else {
              mainDiv.innerHTML = picon('globe') + ' Google整页翻译';
              subDiv.textContent = "经典Google翻译工具栏";
              item.style.background = "";
            }
          }
        });

            item.style.background = "#f3f4f6";
          }
        });
        item.addEventListener("mouseleave", function() {
          updateTranslateMenuItems();
        });
        item.addEventListener("click", function(e) {
          e.stopPropagation();
          hideTranslateMenu();
          var action = item.getAttribute("data-action");
          if (action === "bilingual") {
            translatePage();
          } else if (action === "google") {
            googleTranslatePage();
          }
        });
      });

      function googleTranslatePage() {
        var urlToTranslate = currentUrl;
        var isOnGoogleTranslate = urlToTranslate.indexOf("translate.google.com/translate") !== -1;
        if (isOnGoogleTranslate) {
          goBack();
          return;
        }
        var gtUrl = "https://translate.google.com/translate?sl=auto&tl=zh-CN&u=" + encodeURIComponent(urlToTranslate);

          translateMode = "google";
          isTranslated = true;

        }

      // ── Copy & selection context menu for popout ──
      function copyTextToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(text);
        }
        return new Promise(function(resolve) {
          var ta = document.createElement("textarea");
          ta.value = text;
          ta.style.position = "fixed";
          ta.style.left = "-9999px";
          document.body.appendChild(ta);
          ta.select();
          try { document.execCommand("copy"); } catch(e) {}
          document.body.removeChild(ta);
          resolve();
        });
      }

      function openInGoogleTranslate(text) {
        var url = 'https://translate.google.com/?sl=auto&tl=zh-CN&text=' + encodeURIComponent(text) + '&op=translate';
        if (isElectron && wv) {
          _navigateInWebview(url);
        } else {
          window.open(url, '_blank');
        }
      }

      async function googleTranslateText(text) {
        try {
          var resp = await fetch("https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=zh-CN&dt=t&q=" + encodeURIComponent(text));
          var data = await resp.json();
          if (data && data[0]) {
            return data[0].map(function(seg) { return seg[0]; }).join("");
          }
        } catch (e) {
          throw new Error("Google翻译失败: " + e.message);
        }
        return null;
      }

          '<button id="' + popupId + '-close" style="border:none;background:transparent;cursor:pointer;font-size:16px;color:#999;padding:0 4px;line-height:1;">&times;</button>' +
          '</div></div>' +
          '<div id="' + popupId + '-body" style="overflow-y:auto;flex:1;min-height:60px;max-height:400px;padding-right:4px;"><div style="display:flex;align-items:center;gap:8px;"><div class="spinner" style="width:14px;height:14px;border:2px solid #e0e0e0;border-top-color:#1a73e8;border-radius:50%;animation:po-spin 0.8s linear infinite;margin:0;"></div><span style="font-size:12px;color:#888;">翻译中...</span></div></div>';
        document.body.appendChild(popup);

        var currentSource = initialSource;
        var currentOriginal = text;
        var currentTranslated = "";
        var currentSourceLabel = "";
        var currentIsStreaming = false;

        function addSpinnerStyle() {
          if (document.getElementById("po-spinner-style")) return;
          var st = document.createElement("style");
          st.id = "po-spinner-style";
          st.textContent = "@keyframes po-spin{to{transform:rotate(360deg)}}";
          document.head.appendChild(st);
        }
        addSpinnerStyle();

        function updateSourceButtons() {
          var aiBtn = document.getElementById(popupId + '-source-ai');
          var gBtn = document.getElementById(popupId + '-source-google');
          if (aiBtn) aiBtn.style.cssText = 'border:1px solid;border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer;' + (currentSource === 'ai' ? activeStyle : inactiveStyle) + aiBtnDisabled;
          if (gBtn) gBtn.style.cssText = 'border:1px solid;border-radius:4px;padding:3px 10px;font-size:11px;cursor:pointer;' + (currentSource === 'google' ? activeStyle : inactiveStyle);
        }

        function positionPopup() {
          requestAnimationFrame(function() {
            var r = popup.getBoundingClientRect();
            if (r.right > window.innerWidth - 10) popup.style.left = Math.max(10, window.innerWidth - r.width - 10) + 'px';
            if (r.bottom > window.innerHeight - 10) popup.style.top = Math.max(10, posY - r.height - 16) + 'px';
            if (r.top < 10) popup.style.top = '10px';
          });
        }

        function renderContent() {
          var body = document.getElementById(popupId + '-body');
          if (!body) return;
          if (currentIsStreaming && !currentTranslated) {
            body.innerHTML = '<div style="display:flex;align-items:center;gap:8px;"><div class="spinner" style="width:14px;height:14px;border:2px solid #e0e0e0;border-top-color:#1a73e8;border-radius:50%;animation:po-spin 0.8s linear infinite;margin:0;"></div><span style="font-size:12px;color:#888;">翻译中...</span></div>';
          } else {
            body.innerHTML = '<div style="color:#57606a;font-size:11px;margin-bottom:4px;font-weight:500;position:sticky;top:0;background:#fff;padding:2px 0;">原文</div>' +
              '<div style="color:#24292e;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #eaecef;white-space:pre-wrap;word-break:break-word;line-height:1.5;font-size:12px;">' + escapeHtml(currentOriginal) + '</div>' +
              (currentTranslated ? '<div style="color:#1a73e8;font-size:11px;margin-bottom:4px;font-weight:500;position:sticky;top:0;background:#fff;padding:2px 0;">' + escapeHtml(currentSourceLabel) + (currentIsStreaming ? ' <span class="spinner" style="width:10px;height:10px;border:1.5px solid #e0e0e0;border-top-color:#1a73e8;border-radius:50%;animation:po-spin 0.8s linear infinite;display:inline-block;vertical-align:middle;margin-left:4px;"></span>' : '') + '</div>' +
              '<div style="color:#1a73e8;white-space:pre-wrap;word-break:break-word;line-height:1.6;font-size:13px;">' + escapeHtml(currentTranslated).replace(/\n/g, '<br>') + '</div>' : '');
          }
          positionPopup();
        }

        var closeBtn = document.getElementById(popupId + '-close');
        if (closeBtn) closeBtn.addEventListener('click', function() { popup.remove(); });

        var copyBtn = document.getElementById(popupId + '-copy-btn');
        if (copyBtn) copyBtn.addEventListener('click', function() {
          if (currentTranslated) {
            copyTextToClipboard(currentTranslated).then(function() {
              copyBtn.innerHTML = picon('check') + ' 已复制';
              setTimeout(function() { copyBtn.innerHTML = picon('copy') + ' 复制'; }, 1500);
            });
          }
        });

        var openGoogleBtn = document.getElementById(popupId + '-open-google-btn');
        if (openGoogleBtn) openGoogleBtn.addEventListener('click', function() { openInGoogleTranslate(text); });

        async function runTranslation(source) {
          currentSource = source;
          currentIsStreaming = true;
          currentTranslated = "";
          updateSourceButtons();
          renderContent();

          if (source === 'ai' && hasAi && window.AI) {
            try {
              var tp = window.AI.getTranslateProvider(config);
              var fullResponse = "";
              var _rafPending = false;
              var stream = window.AI.streamChat(tp.type, tp.apiKey, tp.baseUrl, {
                model: tp.model,
                messages: [
                  { role: "system", content: "你是一位专业的专利文献翻译专家。请将以下文本翻译为中文。保持专利术语的准确性，保留所有数字标记，翻译要流畅自然。只返回翻译结果。" },
                  { role: "user", content: text }
                ],
                temperature: 0.3,
                maxTokens: 4096,
              });

              for await (var chunk of stream) {
                if (chunk.content) {
                  fullResponse += chunk.content;
                  currentTranslated = fullResponse;
                  currentSourceLabel = "AI译文";
                  if (!_rafPending) {
                    _rafPending = true;
                    requestAnimationFrame(function() {
                      renderContent();
                      var bd = document.getElementById(popupId + '-body');
                      if (bd) bd.scrollTop = bd.scrollHeight;
                      _rafPending = false;
                    });
                  }
                }
              }
              currentIsStreaming = false;
              currentTranslated = fullResponse;
              currentSourceLabel = "AI译文";
              renderContent();
              return;
            } catch (e) {
              console.warn("AI translate failed, falling back to Google:", e);
              currentIsStreaming = false;
            }
          }

          try {
            currentSource = 'google';
            updateSourceButtons();
            var googleResult = await googleTranslateText(text);
            currentIsStreaming = false;
            if (googleResult) {
              currentTranslated = googleResult;
              currentSourceLabel = "Google译文";
            } else {
              currentTranslated = "翻译失败，未获取到结果";
            }
            renderContent();
          } catch (e) {
            currentIsStreaming = false;
            currentTranslated = "翻译失败: " + e.message;
            currentSourceLabel = "错误";
            renderContent();
          }
        }

        var aiBtn = document.getElementById(popupId + '-source-ai');
        var gBtn = document.getElementById(popupId + '-source-google');
        if (aiBtn) aiBtn.addEventListener('click', function() { if (!currentIsStreaming) runTranslation('ai'); });
        if (gBtn) gBtn.addEventListener('click', function() { if (!currentIsStreaming) runTranslation('google'); });

        positionPopup();
        setTimeout(function() { runTranslation(initialSource); }, 50);
      }

      // Get selected text from webview (if electron) or document
      function getSelectedText(cb) {
        if (isElectron && wv && wv.executeJavaScript) {
          try {
            wv.executeJavaScript('window.getSelection ? window.getSelection().toString() : ""')
              .then(function(txt) { cb(txt || ""); })
              .catch(function() { cb(""); });
            return;
          } catch(e) {}
        }
        var sel = window.getSelection();
        cb(sel ? sel.toString() : "");
      }

      // Listen for mouseup to detect selection
      document.addEventListener("mouseup", function(e) {
        if (e.button === 2) return; // right-click is handled by contextmenu handler
        if (_popCtxMenu && _popCtxMenu.contains(e.target)) return;
        if (_popSelBtn && _popSelBtn.contains(e.target)) return;
        if (e.target.closest && (e.target.closest("#pop-translation-popup") || e.target.closest("button"))) return;
        setTimeout(function() {
          if (_popJustOpened) return;
          getSelectedText(function(text) {
            text = (text || "").trim();
            if (text && text.length > 1 && text.length < 2000) {
              var bx = e.clientX, by = e.clientY - 36;
              showPopSelBtn(bx, by, text);
            } else {
              hidePopSelMenu();
            }
          });
        }, 10);
      });

      document.addEventListener("mousedown", function(e) {
        if (_popSelBtn && _popSelBtn.contains(e.target)) return;
        if (_popCtxMenu && _popCtxMenu.contains(e.target)) return;
        if (e.target.closest && e.target.closest("#pop-translation-popup")) return;
        hidePopSelMenu();
        hidePopCtxMenu();
      });

      document.addEventListener("contextmenu", function(e) {
        if (e.target.closest && (e.target.closest("#pop-translation-popup") || e.target.closest("button") || e.target.closest("input") || e.target.closest("select") || e.target.closest("textarea"))) return;
        var sel = window.getSelection();
        var text = sel ? sel.toString().trim() : "";
        if (text && text.length > 1 && text.length < 5000) {
          e.preventDefault();
          e.stopPropagation();
          showPopCtxMenu(e.clientX, e.clientY, text);
        } else {
          hidePopSelMenu();
          hidePopCtxMenu();
        }
      }, true);

      document.addEventListener("scroll", function() { hidePopSelMenu(); hidePopCtxMenu(); }, true);
      document.addEventListener("keydown", function(e) {
        if (e.key === "Escape") { hidePopCtxMenu(); hidePopSelMenu(); var pp = document.getElementById("pop-translation-popup"); if (pp) pp.remove(); }
      });

      if (targetUrl) embed(); else showFallback();
    })();
  </script>
</body>
</html>
