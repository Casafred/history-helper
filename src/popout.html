<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>专利原文查看</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #fff; }
    body { display: flex; flex-direction: column; }
    #po-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; background: #f5f7fa; border-bottom: 1px solid #d8dce6;
      flex-shrink: 0;
    }
    #po-title { font-size: 13px; color: #1a1d27; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .po-btn {
      cursor: pointer; border: 1px solid #bbb; background: #fff; color: #333;
      font-size: 12px; padding: 4px 12px; border-radius: 4px; transition: all 0.2s;
      white-space: nowrap; text-decoration: none; display: inline-block;
    }
    .po-btn:hover { background: #4f8ff7; color: #fff; border-color: #4f8ff7; }
    .po-btn-find { width: 28px; height: 26px; padding: 2px 0; display: inline-flex; align-items: center; justify-content: center; }
    #po-jp-bar {
      display: none; align-items: center; gap: 8px;
      background: #fff3cd; border-bottom: 1px solid #ffc107;
      padding: 6px 14px; font-size: 12px; color: #856404; flex-shrink: 0;
    }
    #po-jp-bar .po-jp-label { font-weight: bold; }
    #po-jp-bar .po-jp-hint { flex: 1; color: #a08030; }
    #po-find-bar {
      display: none; align-items: center; gap: 6px;
      background: #f5f5f5; border-bottom: 1px solid #ddd;
      padding: 6px 12px; flex-shrink: 0;
    }
    #po-find-input {
      flex: 1; max-width: 240px; background: #fff; border: 1px solid #ccc;
      border-radius: 4px; padding: 4px 8px; font-size: 12px; outline: none;
    }
    #po-find-input:focus { border-color: #4f8ff7; }
    #po-find-count { font-size: 11px; color: #888; min-width: 80px; text-align: center; }
    #po-smart-bar {
      display: none; flex-wrap: wrap; align-items: center; gap: 6px;
      background: #e8f4fd; border-bottom: 1px solid #b3d9f2;
      padding: 6px 14px; font-size: 12px; color: #0c5460; flex-shrink: 0;
    }
    #po-smart-bar .po-smart-label { font-weight: bold; color: #0c5460; margin-right: 4px; }
    #po-smart-bar .po-smart-info { color: #31708f; margin-right: 8px; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #po-smart-bar .po-smart-actions { display: flex; flex-wrap: wrap; gap: 6px; flex: 1; }
    .po-btn-smart {
      cursor: pointer; border: 1px solid #4f8ff7; background: #fff; color: #4f8ff7;
      font-size: 11px; padding: 2px 8px; border-radius: 3px; transition: all 0.2s;
      white-space: nowrap; text-decoration: none; display: inline-block;
    }
    .po-btn-smart:hover { background: #4f8ff7; color: #fff; }
    .po-btn-smart.po-btn-primary { background: #4f8ff7; color: #fff; }
    .po-btn-smart.po-btn-primary:hover { background: #3a7ae6; }
    .po-btn-smart.po-btn-warn { border-color: #e67e22; color: #e67e22; }
    .po-btn-smart.po-btn-warn:hover { background: #e67e22; color: #fff; }
    #po-container { width: 100%; flex: 1; position: relative; background: #fff; min-height: 0; }
    #po-container webview, #po-container iframe { width: 100%; height: 100%; border: none; }
    .po-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #888; font-size: 14px; text-align: center; }
    .po-fallback { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: #555; font-size: 14px; padding: 24px; max-width: 480px; line-height: 1.8; }
    .po-fallback .po-btn { margin-top: 12px; }
  </style>
</head>
<body>
  <div id="po-header">
    <div id="po-title"></div>
    <button id="po-find-toggle" class="po-btn po-btn-find" title="在页面内查找 (Ctrl+F)">🔍</button>
    <button id="po-translate" class="po-btn" title="通过 Google 翻译翻译此页面">翻译</button>
    <button id="po-refresh" class="po-btn" title="刷新当前页面">刷新</button>
    <button id="po-external" class="po-btn" title="在外部浏览器打开">外部打开</button>
    <button id="po-close" class="po-btn" title="关闭窗口">关闭</button>
  </div>
  <div id="po-jp-bar">
    <span class="po-jp-label">🇯🇵 J-PlatPat</span>
    <span id="po-jp-num"></span>
    <span class="po-jp-hint">如果页面未自动加载文献，请点击「番号照会」或使用下方链接手动查找</span>
    <button id="po-jp-opd" class="po-btn" title="打开番号照会页面">番号照会(OPD)</button>
    <button id="po-jp-ext" class="po-btn" title="外部打开">外部打开</button>
    <button id="po-jp-close" class="po-btn po-btn-find" title="关闭提示">✕</button>
  </div>
  <div id="po-smart-bar">
    <span class="po-smart-label" id="po-smart-label">🤖 智能识别</span>
    <span class="po-smart-info" id="po-smart-info"></span>
    <span class="po-smart-actions" id="po-smart-actions"></span>
    <button id="po-smart-close" class="po-btn po-btn-find" title="关闭">✕</button>
  </div>
  <div id="po-find-bar">
    <input type="text" id="po-find-input" placeholder="在页面内查找...">
    <button id="po-find-prev" class="po-btn po-btn-find" title="上一个匹配 (Shift+Enter)">▲</button>
    <button id="po-find-next" class="po-btn po-btn-find" title="下一个匹配 (Enter)">▼</button>
    <span id="po-find-count"></span>
    <button id="po-find-close" class="po-btn po-btn-find" title="关闭查找 (Esc)">✕</button>
  </div>
  <div id="po-container">
    <div class="po-loading">正在加载...</div>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(location.search);
      var targetUrl = params.get("url") || "";
      var title = params.get("title") || targetUrl || "专利原文查看";
      var isElectron = !!window.electronAPI;
      var container = document.getElementById("po-container");
      var translateBtn = document.getElementById("po-translate");
      var refreshBtn = document.getElementById("po-refresh");
      var closeBtn = document.getElementById("po-close");
      var externalBtn = document.getElementById("po-external");
      var titleEl = document.getElementById("po-title");
      var findToggleBtn = document.getElementById("po-find-toggle");
      var findBar = document.getElementById("po-find-bar");
      var findInput = document.getElementById("po-find-input");
      var findPrevBtn = document.getElementById("po-find-prev");
      var findNextBtn = document.getElementById("po-find-next");
      var findCountEl = document.getElementById("po-find-count");
      var findCloseBtn = document.getElementById("po-find-close");
      var jpBar = document.getElementById("po-jp-bar");
      var jpNumEl = document.getElementById("po-jp-num");
      var jpOpdBtn = document.getElementById("po-jp-opd");
      var jpExtBtn = document.getElementById("po-jp-ext");
      var jpCloseBtn = document.getElementById("po-jp-close");
      var smartBar = document.getElementById("po-smart-bar");
      var smartLabel = document.getElementById("po-smart-label");
      var smartInfo = document.getElementById("po-smart-info");
      var smartActions = document.getElementById("po-smart-actions");
      var smartCloseBtn = document.getElementById("po-smart-close");
      titleEl.textContent = decodeURIComponent(title);

      var currentUrl = targetUrl;
      var isTranslated = false;
      var wv = null;
      var loadAttempts = 0;
      var MAX_AUTO_RETRY = 1;
      var LOAD_TIMEOUT_MS = 30000;
      var timeoutTimer = null;
      var findActive = false;
      var findTerm = "";
      var findDebounceTimer = null;
      var findRequestId = 0;
      var jplatpatSearchNum = params.get("jpn") || "";

      var isJplatpat = currentUrl.indexOf("j-platpat.inpit.go.jp") !== -1;
      if (isJplatpat) {
        if (jplatpatSearchNum) {
          jpNumEl.textContent = "番号: " + jplatpatSearchNum;
        } else {
          var jpMatch = currentUrl.match(/JP-(\d{4})-(\d+)/);
          if (jpMatch) {
            jpNumEl.textContent = "番号: " + jpMatch[1] + "-" + jpMatch[2];
          }
        }
        jpBar.style.display = "flex";
      }

      function adjustContainerHeight() {
        // Container uses flex:1, no manual height adjustment needed in flex layout
      }

      // ── Find-in-page ──
      function openFindBar() {
        findBar.style.display = "flex";
        findInput.focus();
        findInput.select();
      }

      function closeFindBar() {
        findBar.style.display = "none";
        findCountEl.textContent = "";
        if (findDebounceTimer) { clearTimeout(findDebounceTimer); findDebounceTimer = null; }
        if (isElectron && wv && wv.stopFindInPage) {
          try { wv.stopFindInPage("clearSelection"); } catch(e) {}
        } else {
          try {
            var iframe = container.querySelector("iframe");
            if (iframe && iframe.contentWindow) iframe.contentWindow.find("", false, false, false);
          } catch(e) {}
        }
        findActive = false;
        findTerm = "";
      }

      function doFindNext() {
        var term = findInput.value;
        if (!term || term.length < 1) return;
        findTerm = term;
        findActive = true;
        if (isElectron && wv && wv.findInPage) {
          try {
            var reqId = ++findRequestId;
            wv.findInPage(term, { forward: true, findNext: true });
          } catch(e) { findCountEl.textContent = "受限"; }
        } else {
          try {
            var iframe = container.querySelector("iframe");
            if (iframe && iframe.contentWindow) {
              var found = iframe.contentWindow.find(term, false, false, false, false, true);
              findCountEl.textContent = found ? "" : "无匹配";
            }
          } catch(e) { findCountEl.textContent = "受限"; }
        }
      }

      function doFindPrev() {
        var term = findInput.value;
        if (!term || term.length < 1) return;
        findTerm = term;
        findActive = true;
        if (isElectron && wv && wv.findInPage) {
          try {
            wv.findInPage(term, { forward: false, findNext: true });
          } catch(e) { findCountEl.textContent = "受限"; }
        } else {
          try {
            var iframe = container.querySelector("iframe");
            if (iframe && iframe.contentWindow) {
              iframe.contentWindow.find(term, false, true, false, false, true);
            }
          } catch(e) {}
        }
      }

      function startNewSearchFromBeginning() {
        var term = findInput.value;
        if (!term || term.length < 1) { findCountEl.textContent = ""; return; }
        findTerm = term;
        findActive = true;
        if (isElectron && wv && wv.findInPage) {
          try {
            if (wv.stopFindInPage) { try { wv.stopFindInPage("clearSelection"); } catch(e) {} }
            var reqId = ++findRequestId;
            wv.findInPage(term, { forward: true, findNext: false });
          } catch(e) { findCountEl.textContent = "受限"; }
        } else {
          try {
            var iframe = container.querySelector("iframe");
            if (iframe && iframe.contentWindow) {
              iframe.contentWindow.find("", false, false, false);
              setTimeout(function() {
                var found = iframe.contentWindow.find(term, false, false, false, false, true);
                findCountEl.textContent = found ? "" : "无匹配";
              }, 30);
            }
          } catch(e) { findCountEl.textContent = "受限"; }
        }
      }

      function debouncedFind() {
        if (findDebounceTimer) clearTimeout(findDebounceTimer);
        findDebounceTimer = setTimeout(function() {
          findDebounceTimer = null;
          startNewSearchFromBeginning();
        }, 300);
      }

      if (findToggleBtn) {
        findToggleBtn.addEventListener("click", function() {
          if (findBar.style.display === "none" || !findBar.style.display) {
            openFindBar();
          } else {
            closeFindBar();
          }
        });
      }
      if (findInput) {
        findInput.addEventListener("input", function() {
          if (findInput.value.length < 1) {
            if (findDebounceTimer) { clearTimeout(findDebounceTimer); findDebounceTimer = null; }
            findCountEl.textContent = "";
            if (isElectron && wv && wv.stopFindInPage) {
              try { wv.stopFindInPage("clearSelection"); } catch(e) {}
            } else {
              try {
                var iframe = container.querySelector("iframe");
                if (iframe && iframe.contentWindow) iframe.contentWindow.find("", false, false, false);
              } catch(e) {}
            }
            findActive = false;
            findTerm = "";
            return;
          }
          debouncedFind();
        });
        findInput.addEventListener("keydown", function(e) {
          if (e.key === "Enter") {
            e.preventDefault();
            if (findDebounceTimer) { clearTimeout(findDebounceTimer); findDebounceTimer = null; }
            if (e.shiftKey) doFindPrev(); else doFindNext();
          } else if (e.key === "Escape") {
            closeFindBar();
          }
        });
      }
      if (findPrevBtn) findPrevBtn.addEventListener("click", doFindPrev);
      if (findNextBtn) findNextBtn.addEventListener("click", doFindNext);
      if (findCloseBtn) findCloseBtn.addEventListener("click", closeFindBar);

      // Electron webview found-in-page event
      document.addEventListener("did-find-in-page", function(e) {
        // Webview fires this on its own element, not document
      });

      // J-PlatPat bar buttons
      if (jpOpdBtn) {
        jpOpdBtn.addEventListener("click", function() {
          loadUrl("https://www.j-platpat.inpit.go.jp/p0000");
        });
      }
      if (jpExtBtn) {
        jpExtBtn.addEventListener("click", function() {
          if (window.electronAPI) window.electronAPI.openExternal(currentUrl);
          else window.open(currentUrl, "_blank");
        });
      }
      if (jpCloseBtn) {
        jpCloseBtn.addEventListener("click", function() {
          jpBar.style.display = "none";
        });
      }
      if (smartCloseBtn) {
        smartCloseBtn.addEventListener("click", function() {
          smartBar.style.display = "none";
        });
      }

      // ── DomProbe: lightweight DOM dehydration + page intelligence (inspired by page-agent) ──
      // Factory: returns the IIFE script string with opts baked in
      function buildProbeScript(opts) {
        opts = opts || {};
        var optsJson = JSON.stringify({ autoFillNum: opts.autoFillNum || "" });
        return [
          "(function(opts) {",
          "  opts = opts || {};",
          "  var autoFillNum = opts.autoFillNum || '';",
        "  function isVisible(el) {",
        "    if (!el || el.nodeType !== 1) return false;",
        "    if (el.offsetParent === null) {",
        "      var st = window.getComputedStyle(el);",
        "      if (st.position !== 'fixed' && st.position !== 'sticky') return false;",
        "    }",
        "    var rect = el.getBoundingClientRect();",
        "    if (rect.width < 2 || rect.height < 2) return false;",
        "    var cs = window.getComputedStyle(el);",
        "    if (cs.visibility === 'hidden' || cs.display === 'none' || cs.opacity === '0') return false;",
        "    return true;",
        "  }",
        "  function isInteractive(el) {",
        "    if (!el || el.nodeType !== 1) return false;",
        "    var tag = el.tagName.toLowerCase();",
        "    if (tag === 'input') {",
        "      var t = (el.type || 'text').toLowerCase();",
        "      return t !== 'hidden' && t !== 'submit' && t !== 'button' && t !== 'reset' && t !== 'image';",
        "    }",
        "    if (tag === 'textarea' || tag === 'select') return true;",
        "    if (tag === 'button' || tag === 'a') return isVisible(el);",
        "    var role = (el.getAttribute('role') || '').toLowerCase();",
        "    if (role === 'button' || role === 'link' || role === 'textbox' || role === 'combobox' || role === 'tab' || role === 'menuitem') return isVisible(el);",
        "    if (el.onclick || el.getAttribute('onclick')) return isVisible(el);",
        "    return false;",
        "  }",
        "  function textOf(el, max) {",
        "    max = max || 80;",
        "    var t = (el.innerText || el.textContent || el.value || '').replace(/\\s+/g, ' ').trim();",
        "    if (t.length > max) t = t.substring(0, max) + '...';",
        "    return t;",
        "  }",
        "  function attr(el, name) { return el.getAttribute(name) || ''; }",
        "  function getElementPath(el) {",
        "    var parts = [];",
        "    var cur = el, depth = 0;",
        "    while (cur && cur.nodeType === 1 && depth < 6) {",
        "      var part = cur.tagName.toLowerCase();",
        "      if (cur.id) { part += '#' + cur.id; parts.unshift(part); break; }",
        "      var cls = (cur.className && typeof cur.className === 'string') ? cur.className.trim().split(/\\s+/).slice(0,2).join('.') : '';",
        "      if (cls) part += '.' + cls;",
        "      parts.unshift(part);",
        "      cur = cur.parentElement; depth++;",
        "    }",
        "    return parts.join(' > ');",
        "  }",
        "  function nativeSetValue(el, val) {",
        "    try {",
        "      var proto = el.tagName.toLowerCase() === 'textarea' ? window.HTMLTextAreaElement.prototype : window.HTMLInputElement.prototype;",
        "      var setter = Object.getOwnPropertyDescriptor(proto, 'value').set;",
        "      setter.call(el, val);",
        "    } catch(e) { el.value = val; }",
        "    el.dispatchEvent(new Event('input', { bubbles: true }));",
        "    el.dispatchEvent(new Event('change', { bubbles: true }));",
        "  }",
        "",
        "  // Collect all interesting elements using TreeWalker (efficient)",
        "  function collectElements() {",
        "    var SKIP_TAGS = {SCRIPT:1, STYLE:1, NOSCRIPT:1, TEMPLATE:1, HEAD:1, META:1, LINK:1, TITLE:1, SVG:1, PATH:1};",
        "    var walker = document.createTreeWalker(document.body || document.documentElement, NodeFilter.SHOW_ELEMENT, {",
        "      acceptNode: function(n) {",
        "        if (SKIP_TAGS[n.tagName]) return NodeFilter.FILTER_REJECT;",
        "        if (n.closest && n.closest('.po-probe-ignore')) return NodeFilter.FILTER_REJECT;",
        "        return isInteractive(n) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_SKIP;",
        "      }",
        "    });",
        "    var elements = [];",
        "    var idx = 0, n;",
        "    while ((n = walker.nextNode())) {",
        "      var tag = n.tagName.toLowerCase();",
        "      var rec = { i: idx++, tag: tag, path: getElementPath(n) };",
        "      rec.text = textOf(n, 60);",
        "      if (tag === 'input' || tag === 'textarea') {",
        "        rec.type = n.type || 'text';",
        "        rec.ph = attr(n, 'placeholder');",
        "        rec.aria = attr(n, 'aria-label');",
        "        rec.name = attr(n, 'name');",
        "        rec.id = n.id || '';",
        "      }",
        "      if (tag === 'a') rec.href = n.href || '';",
        "      rec.role = attr(n, 'role');",
        "      rec.title = attr(n, 'title');",
        "      rec.w = Math.round(n.getBoundingClientRect().width);",
        "      rec.h = Math.round(n.getBoundingClientRect().height);",
        "      // Data attribute reference for clicking (stashed on element)",
        "      if (!n.__probeIdx) n.__probeIdx = rec.i;",
        "      elements.push(rec);",
        "    }",
        "    // Also collect all links even if invisible-ish (for PDF detection)",
        "    var allLinks = document.querySelectorAll('a[href]');",
        "    var pdfLinks = [];",
        "    for (var li = 0; li < allLinks.length; li++) {",
        "      var a = allLinks[li];",
        "      var href = a.href || '';",
        "      var linkText = textOf(a, 40);",
        "      var onclickAttr = a.getAttribute('onclick') || '';",
        "      if (href.toLowerCase().indexOf('.pdf') !== -1 || href.indexOf('pdf') !== -1 && (href.indexOf('download') !== -1 || href.indexOf('PDF') !== -1 || linkText.indexOf('PDF') !== -1 || linkText.indexOf('pdf') !== -1)) {",
        "        pdfLinks.push({ href: href, text: linkText, visible: isVisible(a) });",
        "      } else if (onclickAttr && (onclickAttr.indexOf('pdf') !== -1 || onclickAttr.indexOf('PDF') !== -1)) {",
        "        pdfLinks.push({ href: href, text: linkText + ' [onclick]', visible: isVisible(a) });",
        "      }",
        "    }",
        "    return { interactive: elements, pdfLinks: pdfLinks };",
        "  }",
        "",
        "  // Page type classification",
        "  function classifyPage(url, collected) {",
        "    var path = (url || '').split('?')[0];",
        "    var host = location.hostname;",
        "    var pageInfo = { host: host, url: url, pageType: 'unknown', title: document.title || '' };",
        "    // J-PlatPat specific rules",
        "    if (host.indexOf('j-platpat') !== -1) {",
        "      if (path.indexOf('/s0100') !== -1 || path.indexOf('/s0200') !== -1) {",
        "        pageInfo.pageType = 'jplatpat_search';",
        "        pageInfo.label = 'J-PlatPat 简单検索';",
        "      } else if (path.indexOf('/s0300') !== -1) {",
        "        pageInfo.pageType = 'jplatpat_result_list';",
        "        pageInfo.label = '検索結果一覧';",
        "      } else if (path.indexOf('/c0100') !== -1 || path.indexOf('/c0200') !== -1 || path.indexOf('/c0300') !== -1) {",
        "        pageInfo.pageType = 'jplatpat_detail';",
        "        pageInfo.label = '特許文献詳細';",
        "      } else if (path.indexOf('/p0000') !== -1 || path.indexOf('/p0100') !== -1) {",
        "        pageInfo.pageType = 'jplatpat_opd';",
        "        pageInfo.label = '番号照会(OPD)';",
        "      } else if (document.querySelector('[id*=\"keika\"], [class*=\"keika\"], a[href*=\"keika\"]') || collected._hasKeika) {",
        "        pageInfo.pageType = 'jplatpat_exam';",
        "        pageInfo.label = '経過情報';",
        "      } else {",
        "        pageInfo.pageType = 'jplatpat_other';",
        "        pageInfo.label = 'J-PlatPat';",
        "      }",
        "    } else if (host.indexOf('google.com/patents') !== -1) {",
        "      pageInfo.pageType = 'google_patents';",
        "      pageInfo.label = 'Google Patents';",
        "    } else if (host.indexOf('globaldossier') !== -1) {",
        "      pageInfo.pageType = 'global_dossier';",
        "      pageInfo.label = 'Global Dossier';",
        "    } else if (host.indexOf('espacenet') !== -1) {",
        "      pageInfo.pageType = 'espacenet';",
        "      pageInfo.label = 'Espacenet';",
        "    }",
        "    return pageInfo;",
        "  }",
        "",
        "  // Extract metadata from page",
        "  function extractMetadata(collected, pageInfo) {",
        "    var meta = {};",
        "    // Find patent number in page (common patterns)",
        "    var bodyText = (document.body && document.body.innerText) || '';",
        "    var pnMatch = bodyText.match(/(JP|WO|EP|US|CN|KR|DE|GB|FR)\\s*-?\\s*\\d{4}\\s*-?\\s*\\d{3,}[A-Z0-9]*/i);",
        "    if (pnMatch) meta.patentNumber = pnMatch[0].replace(/\\s+/g,'');",
        "    // Look for JP format specifically",

        "        }",

        "      if (bunkenTab) actions.push({ type: 'click', label: '📑 文献単位表示', targetIdx: bunkenTab.i, _text: 'bunken' });",

        "",
        "  // Auto-fill search number if provided (for J-PlatPat s0100 page)",

        "  };",

        "  // Click element matching text (fallback)",

        "  var pageInfo = classifyPage(location.href, collected);",
        "  var meta = extractMetadata(collected, pageInfo);",
          "  var actions = buildActions(collected, pageInfo, meta);",

      // ── Smart bar rendering ──

      function renderSmartBar(result) {
        _currentProbeResult = result;
        if (!result || !result.pageInfo) { hideSmartBar(); return; }
        var pi = result.pageInfo;
        var actions = result.actions || [];
        // Only show bar if we have meaningful page type or actions
        var isKnownPage = pi.pageType && pi.pageType !== 'unknown';
        var hasActions = actions && actions.some(function(a) { return !a.passive; });
        if (!isKnownPage && !hasActions) { hideSmartBar(); return; }

        smartLabel.textContent = pi.label || "🤖 智能识别";
        var infoParts = [];
        if (result.meta && result.meta.patentNumber) infoParts.push(result.meta.patentNumber);
        else if (result.meta && result.meta.jpNumber) infoParts.push(result.meta.jpNumber);
        if (result.meta && result.meta.title) infoParts.push(result.meta.title);
        if (result.pdfCount > 0) infoParts.push("📄 " + result.pdfCount + "个PDF");
        smartInfo.textContent = infoParts.join(" | ");

        smartActions.innerHTML = "";
        actions.forEach(function(act, idx) {
          if (act.passive) {
            var sp = document.createElement("span");
            sp.style.color = "#31708f"; sp.style.fontSize = "11px"; sp.style.marginLeft = "4px";
            sp.textContent = act.label;
            smartActions.appendChild(sp);
            return;
          }
          var btn = document.createElement("button");
          btn.className = "po-btn-smart" + (act.type === "pdf" ? " po-btn-primary" : "") + (act._text === "keika" ? " po-btn-warn" : "");
          btn.textContent = act.label;
          btn.title = act.type === "pdf" ? (act.href || "") : act.label;
          btn.addEventListener("click", function() {
            handleSmartAction(act);
          });
          smartActions.appendChild(btn);
        });
        smartBar.style.display = "flex";
      }
      function handleSmartAction(act) {
        if (!isElectron || !wv) return;
        if (act.type === "pdf" && act.href) {
          // Open PDF in external browser (reliable for download)
          if (window.electronAPI) window.electronAPI.openExternal(act.href);
          else window.open(act.href, "_blank");
          return;
        }
        if (act.type === "click") {
          // Use text-based click first (more reliable across page re-renders), then fall back to idx
          var clickScript = "(function(){";
          if (act._text === "keika") clickScript += "if(window.__probeClickText) return window.__probeClickText('経過情報');";
          else if (act._text === "bunken") clickScript += "if(window.__probeClickText) return window.__probeClickText('文献単位');";
          if (typeof act.targetIdx === "number" && act.targetIdx >= 0) {
            clickScript += "if(window.__probeClick) return window.__probeClick(" + act.targetIdx + ");";
          }
          clickScript += "return false;})()";
          try { wv.executeJavaScript(clickScript); } catch(e) { console.warn("click failed:", e); }
          // Re-probe after a short delay for new page state
          setTimeout(function() { runDomProbe(); }, 1500);
          return;
        }
      }
      function runDomProbe(opts) {
        if (!isElectron || !wv || !wv.executeJavaScript) return;
        var delay = (opts && opts.delay) || 800;
        var fillNum = (opts && opts.autoFillNum) || "";
        setTimeout(function() {
          try {
            var script = buildProbeScript({ autoFillNum: fillNum });
            wv.executeJavaScript(script).then(function(result) {
              if (result) renderSmartBar(result);
            }).catch(function(e) {
              console.warn("[popout] probe failed:", e);
            });
          } catch(e) { console.warn("[popout] probe error:", e); }
        }, delay);
      }

      var NETWORK_ERRORS = {
        "-100": "ERR_CONNECTION_CLOSED", "-101": "ERR_CONNECTION_RESET", "-102": "ERR_CONNECTION_REFUSED",
        "-105": "ERR_NAME_NOT_RESOLVED", "-106": "ERR_INTERNET_DISCONNECTED", "-109": "ERR_ADDRESS_UNREACHABLE",
        "-118": "ERR_CONNECTION_TIMED_OUT", "-21": "ERR_NETWORK_CHANGED", "-324": "ERR_EMPTY_RESPONSE",
        "-501": "ERR_INSECURE_RESPONSE", "-137": "ERR_NAME_RESOLUTION_FAILED",
      };
      var BLOCKED_ERRORS = { "-300": "ERR_INVALID_RESPONSE", "-20": "ERR_BLOCKED_BY_CLIENT", "-32": "ERR_INVALID_RESPONSE" };

      function classifyError(code) {
        code = String(code);
        if (NETWORK_ERRORS[code]) return "network";
        if (BLOCKED_ERRORS[code]) return "blocked";
        return "other";
      }

      function clearContainer() {
        if (timeoutTimer) { clearTimeout(timeoutTimer); timeoutTimer = null; }
        container.innerHTML = "";
        wv = null;
      }

      function showLoading(msg) {
        clearContainer();
        var div = document.createElement("div");
        div.className = "po-loading";
        div.textContent = msg || "正在加载...";
        container.appendChild(div);
      }

      function showFallback(reason, errorCode) {
        clearContainer();
        var div = document.createElement("div");
        div.className = "po-fallback";
        var errType = classifyError(errorCode);
        var msg;
        if (errType === "network") {
          msg = "网络连接失败，无法加载页面。<br>可能是网络不稳定或目标站点暂时不可用。";
        } else if (errType === "blocked") {
          msg = "该站点禁止嵌入显示。<br>请点击「外部打开」在浏览器中查看。";
        } else {
          msg = "页面加载失败。<br>您可以点击「重试」或「外部打开」在浏览器中查看。";
        }
        if (reason) msg += "<br><br><span style='font-size:11px;color:#aaa'>原因：" + reason + "</span>";
        div.innerHTML = msg;
        var btnRow = document.createElement("div");
        btnRow.style.marginTop = "16px";
        var retryBtn = document.createElement("button");
        retryBtn.className = "po-btn";
        retryBtn.textContent = "重试";
        retryBtn.style.marginRight = "8px";
        retryBtn.addEventListener("click", function() { loadAttempts = 0; embed(); });
        var extBtn = document.createElement("button");
        extBtn.className = "po-btn";
        extBtn.textContent = "外部打开";
        extBtn.addEventListener("click", function() {
          if (window.electronAPI) window.electronAPI.openExternal(currentUrl);
          else window.open(currentUrl, "_blank");
        });
        btnRow.appendChild(retryBtn);
        btnRow.appendChild(extBtn);
        div.appendChild(btnRow);
        container.appendChild(div);

      function embed() {
        showLoading("正在加载...");
        console.log("[popout] embed, isElectron=" + isElectron + ", attempt=" + (loadAttempts+1) + ", url=" + currentUrl);
        loadAttempts++;
        if (isElectron) {
          wv = document.createElement("webview");
          wv.setAttribute("src", currentUrl);
          wv.setAttribute("allowpopups", "");
          wv.setAttribute("useragent", "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36");
          wv.style.width = "100%";

            _loaded = true;

            var ld = container.querySelector(".po-loading");
            if (ld) ld.remove();
            try {
              if (wv.getURL) currentUrl = wv.getURL();

            // Update JP bar visibility based on current URL
            var curIsJp = currentUrl.indexOf("j-platpat.inpit.go.jp") !== -1;

            // Run DomProbe: auto-fill search number (if pending) + analyze page
            var fillNum = "";

            }
            runDomProbe({ autoFillNum: fillNum, delay: 1000 });
          });
          wv.addEventListener("did-finish-load", function() {
            _loaded = true;
            if (timeoutTimer) { clearTimeout(timeoutTimer); timeoutTimer = null; }
            var ld = container.querySelector(".po-loading");
            if (ld) ld.remove();
          });
          wv.addEventListener("did-navigate", function (e) {
            if (e && e.url) {

              hideSmartBar();
            }
          });

              setTimeout(function() { runDomProbe({ delay: 800 }); }, 400);

          });
          wv.addEventListener("did-fail-load", function (e) {
            console.log("[popout] webview did-fail-load", e && e.errorCode, e && e.errorDescription);
            if (e && e.errorCode === -3) return;
            if (e && e.isMainFrame === false) return;
            if (_loaded) return;
            _failed = true;
            if (timeoutTimer) { clearTimeout(timeoutTimer); timeoutTimer = null; }
            if (loadAttempts <= MAX_AUTO_RETRY && classifyError(e && e.errorCode) === "network") {
              console.log("[popout] network error, auto-retrying...");
              setTimeout(function() { embed(); }, 1500);
              return;
            }
            showFallback(e && e.errorDescription, e && e.errorCode);

          wv.addEventListener("new-window", function (e) {

          container.appendChild(wv);

              _failed = true;
              if (loadAttempts <= MAX_AUTO_RETRY) {

              showFallback("加载超时（" + (LOAD_TIMEOUT_MS/1000) + "秒）", "-118");
            }
          }, LOAD_TIMEOUT_MS);
        } else {
          var ifr = document.createElement("iframe");
          ifr.src = currentUrl;
          ifr.style.width = "100%";
          ifr.style.height = "100%";
          ifr.style.border = "none";
          ifr.setAttribute("sandbox", "allow-scripts allow-same-origin allow-forms allow-popups");

            if (ld) {
              ifr.remove();
              showFallback("加载超时", "-118");
            }
          }, 15000);
        }
      }

            "  };",
            "  var s=document.createElement('script');s.type='text/javascript';",
            "  s.src='https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInitInner';document.head.appendChild(s);",
            "})();"
          ].join("");
          try { wv.executeJavaScript(injectCode); }
          catch (e) { loadUrl("https://translate.google.com/translate?sl=auto&tl=zh-CN&u=" + encodeURIComponent(currentUrl)); }
        } else {
          loadUrl("https://translate.google.com/translate?sl=auto&tl=zh-CN&u=" + encodeURIComponent(currentUrl));
        }
      }

      function refreshPage() {
        loadAttempts = 0;
        if (isElectron && wv) {
          try { wv.reload(); } catch (e) { embed(); }
        } else {
          var iframe = container.querySelector("iframe");
          if (iframe) iframe.src = iframe.src;
          else embed();
        }
      }

      translateBtn.addEventListener("click", translatePage);
      refreshBtn.addEventListener("click", refreshPage);
      closeBtn.addEventListener("click", function () { window.close(); });
      externalBtn.addEventListener("click", function (e) {
        e.preventDefault();
        if (window.electronAPI) {
          window.electronAPI.openExternal(currentUrl);
        } else {
          window.open(currentUrl, "_blank");
        }
      });

      if (targetUrl) embed(); else showFallback();
    })();
  </script>
</body>
</html>
